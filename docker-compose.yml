# Docker Compose - Development Environment
# Usage: docker-compose up -d

version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: weather_bot_postgres_dev
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-weather_bot}
      POSTGRES_USER: ${POSTGRES_USER:-weather_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-weather_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-weather_user} -d ${POSTGRES_DB:-weather_bot}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - weather_bot_network

  # Redis Cache & Message Broker
  redis:
    image: redis:7-alpine
    container_name: weather_bot_redis_dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - weather_bot_network

  # FastAPI Backend
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: weather_bot_api_dev
    restart: unless-stopped
    env_file:
      - .env.development
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - weather_bot_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Background Worker (Celery/APScheduler)
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    container_name: weather_bot_worker_dev
    restart: unless-stopped
    env_file:
      - .env.development
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - weather_bot_network

  # React Frontend (Development Server)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: weather_bot_frontend_dev
    restart: unless-stopped
    environment:
      - VITE_API_URL=http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - weather_bot_network

networks:
  weather_bot_network:
    driver: bridge

volumes:
  postgres_data_dev:
  redis_data_dev:
